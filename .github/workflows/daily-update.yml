name: Daily Scrape & Deploy — All Sites

on:
  schedule:
    # 11am ET = 3pm UTC (during EDT) / 4pm UTC (during EST)
    - cron: '0 15 * * *'
  workflow_dispatch: # manual trigger button

jobs:
  # ── Job 1: AllFreeAlerts (main site) ──
  allfreealerts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape all sources
        run: node scraper.js

      - name: Check dead links
        run: node check_links.js

      - name: Show stats
        run: |
          node -e "
          const d=require('./data/results.json');
          const c={};
          for(const i of d){c[i.category]=(c[i.category]||0)+1}
          console.log('=== AllFreeAlerts ===');
          console.log('Total:',d.length);
          Object.entries(c).forEach(([k,v])=>console.log(' ',k,':',v));
          "

      - name: Deploy AllFreeAlerts to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy site/ --project-name=allfreealerts

      - name: Commit updated data
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add data/results.json data/results.csv site/data.json
          git diff --staged --quiet || git commit -m "Daily update: AllFreeAlerts $(date +%Y-%m-%d)"
          git push

  # ── Job 2: All Sub-Sites (parallel) ──
  subsites:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      matrix:
        site:
          - name: recall-alerts
            project: recall-alerts
          - name: remote-jobs
            project: remote-jobs
          - name: ltd-deals
            project: ltd-deals
          - name: grant-finder
            project: grant-finder
          - name: food-deals
            project: food-deals

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape ${{ matrix.site.name }}
        run: node sites/${{ matrix.site.name }}/scraper.js

      - name: Show stats
        run: |
          node -e "
          const d=require('./sites/${{ matrix.site.name }}/site/data.json');
          console.log('=== ${{ matrix.site.name }} ===');
          console.log('Total items:',d.length);
          "

      - name: Deploy ${{ matrix.site.name }} to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy sites/${{ matrix.site.name }}/site/ --project-name=${{ matrix.site.project }}

      - name: Commit updated data
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git pull --rebase || true
          git add sites/${{ matrix.site.name }}/site/data.json
          git diff --staged --quiet || git commit -m "Daily update: ${{ matrix.site.name }} $(date +%Y-%m-%d)"
          git push || (git pull --rebase && git push)

  # ── Job 3: Auto-Post to X (after all scraping done) ──
  autopost:
    runs-on: ubuntu-latest
    needs: [allfreealerts]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Puppeteer for image generation
        run: npm install puppeteer

      - name: Auto-post to X (with images)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node x_autoposter.js

      - name: Commit post history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add x_post_history.json
          git diff --staged --quiet || git commit -m "Update X post history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"
