name: Daily Voice Reel — AllFreeAlerts

on:
  # schedule paused — voice reel needs fixes
  # schedule:
  #   - cron: '30 22 * * *'
  workflow_dispatch: # manual trigger only

jobs:
  voice-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git pull origin main
        name: Pull latest data

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          npm install puppeteer
          pip install edge-tts numpy scipy
          mkdir -p tmp_videos

      - name: Generate and post voice reel to IG + FB
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node generate_voice_reel.js

      - name: Commit post history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add ig_fb_post_history.json
          git diff --staged --quiet || git commit -m "Update voice reel post history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"
