name: Nightly Deep Cleanup

on:
  schedule:
    # 12:05am ET = 4:05am UTC (during EDT)
    - cron: '5 4 * * *'
  workflow_dispatch: # manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git pull origin main
        name: Pull latest data

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove expired entries
        run: node cleanup_expired.js

      - name: Check all links (every category)
        run: node check_links.js

      - name: Deploy to Cloudflare
        run: npx wrangler pages deploy site/ --project-name=allfreealerts --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit if changes
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add data/results.json site/data.json
          git diff --staged --quiet || git commit -m "Nightly cleanup $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"
