name: Daily Content Kit — Email Ready-to-Post Content

on:
  schedule:
    # 10:37am ET = 2:37pm UTC (during EDT) — 30 min after daily scrape
    - cron: '37 14 * * *'
  workflow_dispatch: # manual trigger

jobs:
  content-kit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git pull origin main
        name: Pull latest data

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and email content kit
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node generate_content_kit.js

      - name: Commit history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add content_kit_history.json
          git diff --staged --quiet || git commit -m "Update content kit history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"
