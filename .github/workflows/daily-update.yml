name: Daily Scrape & Deploy — AllFreeAlerts

on:
  schedule:
    # 10:07am ET = 2:07pm UTC (during EDT)
    - cron: '7 14 * * *'
  workflow_dispatch: # manual trigger button

jobs:
  # ── Scrape & Deploy AllFreeAlerts ──
  allfreealerts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Scrape all sources
        run: node scraper.js

      - name: Check dead links
        run: node check_links.js

      - name: QA new entries (validate links + remove middlemen)
        run: node qa_new_entries.js

      - name: Final cleanup (expired + stale entries)
        run: node cleanup_expired.js

      - name: Email QA report
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const qaLog = JSON.parse(fs.readFileSync('data/qa_log.json','utf8'));
          const latest = qaLog[qaLog.length - 1];
          if (!latest || (latest.removed === 0 && latest.flagged === 0)) { console.log('No removals or flags, skipping email'); process.exit(0); }
          let html = '<h2>AllFreeAlerts QA Report — ' + latest.date + '</h2>' +
            '<p><b>' + latest.total_checked + '</b> new entries checked. <b>' + latest.passed + '</b> passed. <b style=\"color:red\">' + latest.removed + '</b> removed. <b style=\"color:orange\">' + (latest.flagged||0) + '</b> flagged.</p>';
          if (latest.removed > 0) {
            const lines = latest.removed_entries.map(e =>
              '<tr><td>' + e.source + '</td><td>' + e.title.substring(0,60) + '</td><td><a href=\"' + e.link + '\">' + e.link.substring(0,50) + '...</a></td><td style=\"color:red\">' + e.reason + '</td></tr>'
            ).join('');
            html += '<h3 style=\"color:red\">Removed (not live)</h3>' +
              '<table border=\"1\" cellpadding=\"5\" style=\"border-collapse:collapse\"><tr><th>Source</th><th>Title</th><th>Link</th><th>Reason</th></tr>' + lines + '</table>';
          }
          if (latest.flagged_entries && latest.flagged_entries.length > 0) {
            const flagLines = latest.flagged_entries.map(e =>
              '<tr><td>' + e.source + '</td><td>' + e.title.substring(0,60) + '</td><td><a href=\"' + e.link + '\">' + e.link.substring(0,50) + '...</a></td><td style=\"color:orange\">' + e.flag + '</td></tr>'
            ).join('');
            html += '<h3 style=\"color:orange\">Flagged (live but check manually)</h3>' +
              '<table border=\"1\" cellpadding=\"5\" style=\"border-collapse:collapse\"><tr><th>Source</th><th>Title</th><th>Link</th><th>Reason</th></tr>' + flagLines + '</table>';
          }
          html += '<p style=\"color:#666;margin-top:20px\">Removed entries were blocked before going live. Flagged entries are live but may need manual review.</p>';
          const body = JSON.stringify({
            sender: { name: 'AllFreeAlerts QA', email: 'contact@allfreealerts.com' },
            to: [{ email: 'contact@allfreealerts.com' }],
            subject: 'QA Report: ' + latest.removed + ' removed, ' + (latest.flagged||0) + ' flagged — ' + latest.date,
            htmlContent: html
          });
          const req = https.request({
            hostname: 'api.brevo.com', path: '/v3/smtp/email', method: 'POST',
            headers: { 'api-key': process.env.BREVO_API_KEY, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
          }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>console.log('Email sent:', res.statusCode, d)); });
          req.on('error', e => console.log('Email error:', e.message));
          req.write(body); req.end();
          "

      - name: Generate RSS feed
        run: node generate_rss.js

      - name: Show stats
        run: |
          node -e "
          const d=require('./data/results.json');
          const c={};
          for(const i of d){c[i.category]=(c[i.category]||0)+1}
          console.log('=== AllFreeAlerts ===');
          console.log('Total:',d.length);
          Object.entries(c).forEach(([k,v])=>console.log(' ',k,':',v));
          "

      - name: Generate social images for IG/FB
        run: |
          npm install puppeteer
          node ig_fb_autoposter.js --dry-run

      - name: Verify critical site files exist
        run: |
          echo "Checking critical files before deploy..."
          for f in site/ads.txt site/about.html site/blog/index.html site/sitemap.xml site/sweepstakes.html site/freebies.html site/settlements.html; do
            if [ ! -f "$f" ]; then echo "FATAL: $f is missing! Aborting deploy."; exit 1; fi
            echo "  OK: $f"
          done
          echo "All critical files present."

      - name: Deploy AllFreeAlerts to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy site/ --project-name=allfreealerts --commit-dirty=true

      - name: Send daily email digest to subscribers
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node generate_email.js

      - name: Commit updated data
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add data/results.json data/results.csv site/data.json data/qa_log.json data/link_check_cache.json data/removed_blocklist.json
          git diff --staged --quiet || git commit -m "Daily update: AllFreeAlerts $(date +%Y-%m-%d)"
          git push

  # ── Auto-Post to X (after scraping) ──
  autopost-x:
    runs-on: ubuntu-latest
    needs: [allfreealerts]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Puppeteer for image generation
        run: npm install puppeteer

      - name: Auto-post to X (with images)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node x_autoposter.js

      - name: Commit post history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add x_post_history.json
          git diff --staged --quiet || git commit -m "Update X post history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"

  # ── Auto-Post to Instagram + Facebook (after deploy) ──
  autopost-ig-fb:
    runs-on: ubuntu-latest
    needs: [allfreealerts]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git pull origin main
        name: Pull latest (includes fresh data.json)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Post to Instagram + Facebook (generates images, deploys, then posts)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node ig_fb_autoposter.js

      - name: Commit post history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add ig_fb_post_history.json site/social/generated/
          git diff --staged --quiet || git commit -m "Update IG/FB post history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"

  # ── Auto-Post to Bluesky (after deploy) ──
  autopost-bluesky:
    runs-on: ubuntu-latest
    needs: [allfreealerts]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git pull origin main
        name: Pull latest data

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Post to Bluesky
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: node bluesky_autoposter.js

      - name: Commit post history
        run: |
          git config user.name "AllFreeAlerts Bot"
          git config user.email "bot@allfreealerts.com"
          git add bluesky_post_history.json
          git diff --staged --quiet || git commit -m "Update Bluesky post history $(date +%Y-%m-%d)"
          git push || echo "Push failed, will retry next run"

