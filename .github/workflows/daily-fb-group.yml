name: Daily Facebook Group Posts

on:
  schedule:
    # 12:30pm ET = 4:30pm UTC (during EDT)
    - cron: '30 16 * * *'
  workflow_dispatch: # manual trigger

jobs:
  fb-group:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Post to Facebook Group
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_GROUP_ID: '1238490111787169'
        run: node fb_group_autoposter.js

      - name: Commit post history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fb_group_post_history.json
          git diff --staged --quiet || git commit -m "Update FB Group post history $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
